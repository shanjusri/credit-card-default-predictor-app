{% extends "base.html" %}

{% block content %}

<div class="dashboard-grid">

    <div class="card glass-card settings-card">

        <div class="card-header">
            <h3><i class="fa-solid fa-gear"></i> Settings</h3>
            <p>Model configuration and system details</p>
        </div>

        <div class="card-body">

            <div class="setting-item">
                <h4>Model Used</h4>
                <p class="model-name">XGBoost</p>
            </div>

            <div class="setting-item">
                <h4>Version</h4>
                <p>v1.0</p>
            </div>

            <div class="setting-item">
                <h4>Status</h4>
                <p class="status-active">Active</p>
            </div>

        </div>

    </div>

</div>

{% endblock %}
