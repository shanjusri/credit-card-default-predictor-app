{% extends "base.html" %}

{% block content %}
<div class="dashboard-grid">
    <div class="card glass-card form-card">
        <div class="card-header">
            <h3><i class="fa-solid fa-user-pen"></i> Single Prediction</h3>
            <p>Enter client details manually</p>
        </div>
        <div class="card-body">
            <form action="/predict" method="POST" id="predictionForm">
                <div class="input-grid">
                    <div class="form-group">
                        <label for="ID">Client ID</label>
                        <input type="number" id="ID" name="ID" required>
                    </div>

                    <div class="form-group">
                        <label for="AGE">Age</label>
                        <input type="number" id="AGE" name="AGE" required>
                    </div>

                    <div class="form-group">
                        <label for="LIMIT_BAL">Credit Limit</label>
                        <input type="number" id="LIMIT_BAL" name="LIMIT_BAL" required>
                    </div>

                    <div class="form-group">
                        <label for="SEX">Sex</label>
                        <select id="SEX" name="SEX" required>
                            <option value="">Select...</option>
                            <option value="1">Male</option>
                            <option value="2">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="EDUCATION">Education</label>
                        <select id="EDUCATION" name="EDUCATION" required>
                            <option value="">Select...</option>
                            <option value="1">Graduate School</option>
                            <option value="2">University</option>
                            <option value="3">High School</option>
                            <option value="4">Others</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="MARRIAGE">Marriage</label>
                        <select id="MARRIAGE" name="MARRIAGE" required>
                            <option value="">Select...</option>
                            <option value="1">Married</option>
                            <option value="2">Single</option>
                            <option value="3">Others</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="PAY_0">Payment Status (Last Month)</label>
                        <input type="number" id="PAY_0" name="PAY_0" required>
                    </div>

                    <div class="form-group">
                        <label for="PAY_2">Payment Status (2 Months Ago)</label>
                        <input type="number" id="PAY_2" name="PAY_2" required>
                    </div>

                    <div class="form-group">
                        <label for="PAY_3">Payment Status (3 Months Ago)</label>
                        <input type="number" id="PAY_3" name="PAY_3" required>
                    </div>

                    <div class="form-group">
                        <label for="BILL_AMT1">Bill Amount Last Month</label>
                        <input type="number" id="BILL_AMT1" name="BILL_AMT1" required>
                    </div>

                    <div class="form-group">
                        <label for="BILL_AMT2">Bill Amount 2 Months Ago</label>
                        <input type="number" id="BILL_AMT2" name="BILL_AMT2" required>
                    </div>

                    <div class="form-group">
                        <label for="PAY_AMT1">Previous Payment Amount</label>
                        <input type="number" id="PAY_AMT1" name="PAY_AMT1" required>
                    </div>

                    <div class="form-group">
                        <label for="PAY_AMT2">Previous Payment Amount (2 Months Ago)</label>
                        <input type="number" id="PAY_AMT2" name="PAY_AMT2" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary mt-3">
                    <i class="fa-solid fa-bolt"></i> Predict Default Risk
                </button>
            </form>
        </div>
    </div>

    <div class="side-panel">
        <div class="card glass-card upload-card mb-4 mt-auto">
            <div class="card-header">
                <h3><i class="fa-solid fa-file-csv"></i> Batch Prediction</h3>
                <p>Upload a CSV file for multiple predictions</p>
            </div>
            <div class="card-body text-center">
                <form action="/predict_csv" method="POST" enctype="multipart/form-data" id="uploadForm">
                    <div class="file-drop-area" id="dropArea">
                        <i class="fa-solid fa-cloud-arrow-up drop-icon"></i>
                        <span class="file-msg">Drag & Drop CSV or Click</span>
                        <input type="file" name="file" class="file-input" id="fileInput" accept=".csv" required>
                    </div>
                    <button type="submit" class="btn btn-secondary mt-3 w-100">
                        <i class="fa-solid fa-cogs"></i> Process Batch
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
